# Optional local overrides (OpenAI key). Copy from application-local.properties.example
spring.config.import=optional:classpath:application-local.properties

server.port=8082

# OpenAI Chat Completions API
openai.api.url=https://api.openai.com/v1/chat/completions
openai.api.key=${OPENAI_API_KEY:}
openai.model=gpt-4o-mini
openai.timeoutMs=60000

# Live admission lookup
live.lookup.enabled=true
live.lookup.search-url=https://search.yahoo.com/search?p=
live.lookup.timeoutMs=12000

# College details - edit these values to personalize the chatbot
college.name=ABC College
college.application-window=April to June
college.counselling-month=July
college.admission-mode=Online application + merit or entrance based selection
college.scholarships=Merit-based scholarships available
college.contact-email=admissions@abccollege.edu
college.contact-phone=+91-9876543210
college.website=www.abccollege.edu
college.hero-highlights[0]=Career-focused programs
college.hero-highlights[1]=Scholarships for meritorious students
college.hero-highlights[2]=Supportive admission guidance

college.courses[0].name=B.Tech
college.courses[0].eligibility=10+2 with Physics, Chemistry, Maths, minimum 60%, JEE Main or state-level entrance preferred
college.courses[0].fees=INR 1,20,000 per year

college.courses[1].name=BCA
college.courses[1].eligibility=10+2 from recognized board, minimum 50%, Maths or Computer preferred
college.courses[1].fees=INR 75,000 per year

college.courses[2].name=BBA
college.courses[2].eligibility=10+2 from recognized board, minimum 50%, personal interview may apply
college.courses[2].fees=INR 85,000 per year

college.courses[3].name=MBA
college.courses[3].eligibility=Graduation with minimum 55%, CAT, MAT or college entrance test accepted
college.courses[3].fees=INR 1,50,000 per year

college.common-documents[0]=10th marksheet
college.common-documents[1]=12th marksheet
college.common-documents[2]=Graduation marksheets for MBA
college.common-documents[3]=Transfer certificate
college.common-documents[4]=Aadhaar or valid photo ID
college.common-documents[5]=Passport size photos
college.common-documents[6]=Entrance scorecard if applicable
college.common-documents[7]=Category certificate if applicable
